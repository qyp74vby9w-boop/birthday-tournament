<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Турниры</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="sitePage">

<div class="eventLogo">
    <div class="eventLogoNumber">33</div>
    <div class="eventLogoText">года выдержки</div>
</div>

<h1>Турниры</h1>
<div id="message"></div>
<div class="tournaments">

    <div class="card" data-tournament="beerpong">
        <img
            src="assets/Beer.Pong.png"
            class="tournamentBg tournamentBgBeerpong"
            alt=""
            aria-hidden="true"
        />
        <h2>Бир-понг</h2>
        <p>Участников: <span id="count-beerpong">0</span></p>
        <button class="registerButton">Записаться</button>
        <button class="participantsButton">Список участников</button>
        <div class="participantsList hidden" id="list-beerpong"></div>
    </div>

    <div class="card" data-tournament="kicker">
        <img
            src="assets/kicker.png"
            class="tournamentBg tournamentBgKicker"
            alt=""
            aria-hidden="true"
        />
        <h2>Кикер</h2>
        <p>Участников: <span id="count-kicker">0</span></p>
        <button class="registerButton">Записаться</button>
        <button class="participantsButton">Список участников</button>
        <div class="participantsList hidden" id="list-kicker"></div>
    </div>

    <div class="card" data-tournament="jenga">
        <img
            src="assets/Jenga.png"
            class="tournamentBg tournamentBgJenga"
            alt=""
            aria-hidden="true"
        />
        <h2>Большая дженга</h2>
        <p>Участников: <span id="count-jenga">0</span></p>
        <button class="registerButton">Записаться</button>
        <button class="participantsButton">Список участников</button>
        <div class="participantsList hidden" id="list-jenga"></div>
    </div>

</div>

<section id="bracketrySection">
    <h2>Турнирные сетки</h2>
    <div id="bracketry-beerpong"></div>
    <div id="bracketry-kicker"></div>
    <div id="bracketry-jenga"></div>
</section>

<div id="registrationModal" class="hidden">

    <div class="modalHeader">
        <h2>Регистрация</h2>
    </div>

    <select id="teamType">
        <option value="single">Один участник</option>
        <option value="team">Команда из двух человек</option>
    </select>

    <div id="singleFields">

        <input id="firstName" placeholder="Имя">
        <input id="lastName" placeholder="Фамилия">

    </div>

    <div id="teamFields" class="hidden">

        <input id="firstName1" placeholder="Имя участника 1">
        <input id="lastName1" placeholder="Фамилия участника 1">

        <input id="firstName2" placeholder="Имя участника 2">
        <input id="lastName2" placeholder="Фамилия участника 2">

    </div>

    <button id="registerBtn">
        Зарегистрироваться
    </button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
